name: ExampleApp
options:
  bundleIdPrefix: com.valueflow.examples
  deploymentTarget:
    iOS: "17.0"
packages:
  ValueFlow:
    path: ..
targets:
  ExampleApp:
    type: application
    platform: iOS
    sources: [Sources]
    dependencies:
      - package: ValueFlow
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SWIFT_VERSION: "6.0"
        CODE_SIGNING_ALLOWED: NO
  ExampleAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [UITests]
    dependencies:
      - target: ExampleApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        CODE_SIGNING_ALLOWED: NO
schemes:
  ExampleApp:
    build:
      targets:
        ExampleApp: all
    run:
      config: Debug
    test:
      config: Debug
      # No lldb attach on Cmd-U — attaching to the UI-test runner is denied on
      # this macOS/Xcode beta pair even with developer mode enabled, and the
      # xcodebuild path (test*.sh) never attaches anyway. Cost: no breakpoints
      # inside tests.
      debugEnabled: false
      targets:
        - ExampleAppUITests
