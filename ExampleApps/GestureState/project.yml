name: GestureStateExample
options:
  bundleIdPrefix: com.valueflow.examples
  deploymentTarget:
    iOS: "17.0"
packages:
  ValueFlow:
    path: ../..
targets:
  GestureStateExample:
    type: application
    platform: iOS
    sources: [Sources]
    dependencies:
      - package: ValueFlow
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SWIFT_VERSION: "6.0"
        CODE_SIGNING_ALLOWED: NO
  GestureStateExampleUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [UITests]
    dependencies:
      - target: GestureStateExample
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        CODE_SIGNING_ALLOWED: NO
schemes:
  GestureStateExample:
    build:
      targets:
        GestureStateExample: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - GestureStateExampleUITests
